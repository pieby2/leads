services:
  # ----------------------------------------
  # BACKEND: FastAPI Service (Docker for ffmpeg)
  # ----------------------------------------
  - type: web
    name: vidcompare-backend
    env: docker
    rootDir: backend
    plan: free # Note: ffmpeg and AI parsing might be slow on the free tier
    envVars:
      # Database connection (using Render's managed Postgres)
      - key: DATABASE_URL
        fromDatabase:
          name: vidcompare-db
          property: connectionString
      
      # Redis connection
      - key: REDIS_URL
        fromService:
          type: redis
          name: vidcompare-redis
          property: connectionString
          
      # LLM Keys
      - key: OPENAI_API_KEY
        sync: false
        
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
        
      # OAuth Keys
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
        
      # Redirect URI using Render's auto-generated URL
      - key: OAUTH_REDIRECT_URI
        value: "https://vidcompare-backend.onrender.com/api/auth"
        
      - key: SECRET_KEY
        generateValue: true

  # ----------------------------------------
  # FRONTEND: Next.js Service (Docker)
  # ----------------------------------------
  - type: web
    name: vidcompare-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      # Pass the backend's URL to the frontend dynamically
      - key: NEXT_PUBLIC_API_URL
        value: "https://vidcompare-backend.onrender.com"
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: "https://vidcompare-frontend.onrender.com"

  # ----------------------------------------
  # REDIS: Background Tasks/Caching
  # ----------------------------------------
  - type: redis
    name: vidcompare-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

# ----------------------------------------
# DATABASE: Managed Postgres
# ----------------------------------------
databases:
  - name: vidcompare-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
